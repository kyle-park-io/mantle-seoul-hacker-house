# Mantle Contracts - Foundry Configuration
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
ffi = false
ast = true
build_info = true
extra_output = ["storageLayout"]
gas_reports = ["MantleUSDC", "MockERC20", "MockERC20Solady"]

# --- Stack-too-deep demo profiles ----------------------------------------
# These two profiles compile `demos/stack_too_deep/` to show the effect of
# the IR pipeline. The default profile above ignores that folder entirely
# so `forge build` / `forge test` stay green.
#
#   FOUNDRY_PROFILE=stack_deep forge build   # fails: stack too deep
#   FOUNDRY_PROFILE=via_ir     forge build   # same source, succeeds
# -------------------------------------------------------------------------
[profile.stack_deep]
src = "demos/stack_too_deep"
test = "demos/stack_too_deep"
out = "out_stack_deep"
via_ir = false
optimizer = false

[profile.via_ir]
src = "demos/stack_too_deep"
test = "demos/stack_too_deep"
out = "out_via_ir"
via_ir = true
optimizer = true

# Mantle RPC endpoints
[rpc_endpoints]
mantle = "${MANTLE_RPC_URL}"
mantle_testnet = "${MANTLE_TESTNET_RPC_URL}"
localhost = "http://127.0.0.1:8545"

# Etherscan verification
[etherscan]
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.mantlescan.xyz/api" }
mantle_testnet = { key = "${MANTLESCAN_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api" }

# Fuzz testing configuration
[fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x1234"

# Invariant testing configuration
[invariant]
runs = 256
depth = 15
fail_on_revert = true

# Lint configuration
[lint]
severity = ["high", "med"]
exclude_lints = [
    "unaliased-plain-import",
    "mixed-case-variable",
    "mixed-case-function",
    "named-struct-fields",
    "unsafe-typecast",
    "erc20-unchecked-transfer",
]

# Formatter
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"
